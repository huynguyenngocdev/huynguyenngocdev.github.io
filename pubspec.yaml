name: huy_resume
description: A Flutter Web project to show my portfolio.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'
# consider running `flutter pub upgrade --major-versions`
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  tuple: ^2.0.0
  cupertino_icons: ^1.0.8
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
flutter:
  uses-material-design: true
  fonts:
    - family: AppIcons
      fonts:
        - asset: assets/fonts/AppIcons.ttf
    
    - family: DINPro Black
      fonts:
        - asset: assets/fonts/dinpro/DINPro-Black.ttf
    - family: DINPro Bold
      fonts:
        - asset: assets/fonts/dinpro/DINPro-Bold.ttf
    - family: DINPro Light
      fonts:
        - asset: assets/fonts/dinpro/DINPro-Light.ttf
    - family: DINPro Medium
      fonts:
        - asset: assets/fonts/dinpro/DINPro-Medium.ttf
  assets:
    - assets/images/
    - assets/images/achievements/
